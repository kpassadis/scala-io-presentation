<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZIO for Data Scientists</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1e1e1e; /* Dark theme to match your slides */
            color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            text-align: center;
            padding: 2rem 1rem 1rem 1rem;
        }
        h1 {
            margin: 0;
            color: #df292b; /* ZIO Red */
            font-size: 2.5rem;
        }
        p.subtitle {
            color: #a0a0a0;
            margin-top: 0.5rem;
            font-size: 1.1rem;
        }
        .pdf-container {
            width: 95%;
            max-width: 1200px;
            height: 75vh;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            background-color: #333;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 2rem;
            margin-top: 1rem;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .download-btn {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.6rem 1.2rem;
            background-color: #df292b;
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            transition: background-color 0.2s ease;
        }
        .download-btn:hover {
            background-color: #b92022;
        }
    </style>
</head>
<body>
    <header>
        <h1>ZIO for Data Scientists</h1>
        <p class="subtitle">Pragmatic and fun pipelines without the Category Theory | By Kostas Passadis</p>
        <a href="zio_for_data_scientist.pdf" class="download-btn" download>Download PDF</a>
    </header>
    
    <div class="pdf-container">
        <iframe src="zio_for_data_scientist.pdf" title="ZIO for Data Scientists Presentation">
            <p>Your browser does not support inline PDFs. <a href="zio_for_data_scientist.pdf">Download the PDF here.</a></p>
        </iframe>
    </div>
</body>
</html>
